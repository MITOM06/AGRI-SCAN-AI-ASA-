name: agri-scan-ai

services:
  # 1. CƠ SỞ DỮ LIỆU CHÍNH (MONGODB)
  mongodb:
    image: mongo:8.0
    container_name: asa-mongodb
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretPassword
    volumes:
      - asa-mongo-data:/data/db
    networks:
      - agri-net

  # 2. BỘ NHỚ ĐỆM (REDIS)
  redis:
    image: redis:7.4-alpine
    container_name: asa-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - asa-redis-data:/data
    networks:
      - agri-net

  # 3. AI SERVICE (PYTHON)
  ai-service:
    build:
      context: ../../apps/ai-service
      dockerfile: Dockerfile
    container_name: asa-ai
    restart: always
    ports:
      - "8000:8000" # Giả sử bạn dùng FastAPI/Flask chạy port 8000
    volumes:
      # Mount model vào để không phải copy model nặng vào image (tuỳ chọn)
      - ../../apps/ai-service/models:/app/models
    networks:
      - agri-net

  # 4. BACKEND API (NESTJS)
  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: asa-backend
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis
      - ai-service # Đảm bảo AI chạy trước khi Backend gọi tới
    environment:
      - DB_URI=mongodb+srv://tranphuckhangvllvl_db_user:VnNnk6fB98E123ny@agriscancluster.15qnist.mongodb.net/?appName=AgriScanCluster
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
      - AI_SERVICE_URL=http://ai-service:8000 # Backend gọi AI qua network nội bộ
      - JWT_SECRET=CHANGE_ME_use_a_long_random_string_min_32_chars
      - SMTP_USER=your_gmail@gmail.com
      - SMTP_PASS=your_gmail_app_password
    networks:
      - agri-net

  # 5. WEB FRONTEND (NEXT.JS)
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    container_name: asa-web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000 # Giao diện web gọi tới backend
    networks:
      - agri-net

# 6. OLLAMA SERVICE (CHẠY QWEN2)
  ollama:
    image: ollama/ollama:latest
    container_name: asa-ollama
    restart: always
    volumes:
      - asa-ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - agri-net

volumes:
  asa-mongo-data:
  asa-redis-data:
  asa-ollama-data:

networks:
  agri-net:
    driver: bridge



    