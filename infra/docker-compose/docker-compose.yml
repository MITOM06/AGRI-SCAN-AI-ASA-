name: agri-scan-ai

services:
  # 1. CƠ SỞ DỮ LIỆU CHÍNH (MONGODB)
  mongodb:
    image: mongo:8.0
    container_name: asa-mongodb
    restart: always
    ports:
      - "27018:27017"   # host:container — dev kết nối qua cổng 27018
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretPassword
    volumes:
      - asa-mongo-data:/data/db
    networks:
      - agri-net

  # 2. BỘ NHỚ ĐỆM (REDIS)
  redis:
    image: redis:7.4-alpine
    container_name: asa-redis
    restart: always
    ports:
      - "6380:6379"     # host:container — dev kết nối qua cổng 6380
    volumes:
      - asa-redis-data:/data
    networks:
      - agri-net

  # 3. BACKEND API
  # Khi dev bình thường thì comment service này lại để chạy `pnpm start:dev` cho nhanh
  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: asa-backend
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis
    environment:
      # DB & Cache — dùng tên service làm host khi chạy trong Docker network
      - DB_URI=mongodb://admin:secretPassword@mongodb:27017/agriscan?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000

      # BUG FIX: 3 biến sau bị thiếu hoàn toàn → app crash khi start trong Docker
      # vì auth.module.ts dùng configService.getOrThrow() cho các key này.
      # QUAN TRỌNG: Thay các giá trị placeholder bên dưới bằng giá trị thật
      # trước khi deploy. Không commit giá trị thật lên Git — dùng .env file hoặc secret manager.
      - JWT_SECRET=CHANGE_ME_use_a_long_random_string_min_32_chars
      - SMTP_USER=your_gmail@gmail.com
      - SMTP_PASS=your_gmail_app_password
    networks:
      - agri-net

volumes:
  asa-mongo-data:
  asa-redis-data:

networks:
  agri-net:
    driver: bridge
